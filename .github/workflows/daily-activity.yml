name: Daily Activity

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update activity file
        run: |
          echo "Updated on $(date)" >> activity.txt

      - name: Commit changes
        run: |
          git config --global user.name "ishita2650-ai"
          git config --global user.email "ishita.2650@gmail.com"
          git add .
          git commit -m "Daily activity update" || exit 0
          git push
